name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + type-check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment (frozen to uv.lock)
        run: uv sync --extra dev --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (type-check, strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q
